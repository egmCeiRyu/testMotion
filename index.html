<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport"
content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>AR Thriller Final</title>

<!-- A-Frame -->
<script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>

<!-- Animations -->
<script src="https://cdn.jsdelivr.net/npm/aframe-extras@6.1.1/dist/aframe-extras.min.js"></script>

<script type="module">
import './libs/xr.js'
import './libs/xr-slam.js'

window.addEventListener('xrloaded', () => {
  XR8.setxrconfig({
    libraryPath: './resources/'
  })

  const scene = document.querySelector('a-scene')

  if (scene) {
    scene.setAttribute('xrweb', 'disableWorldTracking: true')
    console.log('XR iniciado com sucesso')
  }
})
</script>

<style>
html,body{
margin:0;
padding:0;
width:100%;
height:100%;
overflow:hidden;
background:#000;
font-family:Arial;
}

#txt{
position:fixed;
top:20px;
left:50%;
transform:translateX(-50%);
z-index:999;
color:#fff;
background:rgba(0,0,0,.55);
padding:10px 16px;
border-radius:12px;
font-size:15px;
}
</style>
</head>

<body>

<div id="txt">Escaneie o marker</div>

<a-scene
xrextras-loading
xrextras-runtime-error
xrextras-almost-there>

<a-assets>
<a-asset-item
id="meu-modelo"
src="./assets/modelo-3d.glb">
</a-asset-item>
</a-assets>

<!-- IMAGE TARGET CERTO -->
<xrextras-named-image-target name="image">

<a-entity
gltf-model="#meu-modelo"
animation-mixer
position="0 0 0"
rotation="0 180 0"
scale="0.35 0.35 0.35">
</a-entity>

</xrextras-named-image-target>

<a-camera position="0 0 0"></a-camera>

</a-scene>

</body>
</html>
