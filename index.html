<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="utf-8" />

  <meta
    name="viewport"
    content="
      width=device-width,
      initial-scale=1,
      maximum-scale=1,
      user-scalable=no
    "
  />

  <title>House AR</title>

  <!-- 8th Wall -->
  <script
    src="./external/scripts/8frame-1.5.0.min.js">
  </script>

  <!-- XR Extras -->
  <script
    src="https://cdn.jsdelivr.net/npm/@8thwall/xrextras@1/dist/xrextras.js"
    crossorigin="anonymous">
  </script>

  <!-- XR Engine -->
  <script
    src="https://cdn.jsdelivr.net/npm/@8thwall/engine-binary@1/dist/xr.js"
    async
    crossorigin="anonymous"
    data-preload-chunks="slam">
  </script>

  <style>

    html,
    body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: black;
      font-family: Arial, sans-serif;
    }

    #promptText {
      position: fixed;

      bottom: 140px;
      left: 50%;

      transform: translateX(-50%);

      color: white;
      font-size: 24px;
      font-weight: bold;

      text-shadow: 0 0 10px black;

      z-index: 999;

      pointer-events: none;
    }

  </style>

  <script>

    AFRAME.registerComponent('tap-place', {

      init() {

        const scene =
          this.el

        const model =
          document.getElementById('model')

        const ring =
          document.getElementById('tapRing')

        const prompt =
          document.getElementById('promptText')

        // =========================
        // RING FOLLOW
        // =========================

        scene.addEventListener('mousemove', (event) => {

          const intersection =
            event.detail.intersection

          if (!intersection) return

          const point =
            intersection.point

          ring.object3D.visible = true

          ring.object3D.position.copy(point)

        })

        // =========================
        // TAP PLACE
        // =========================

        scene.addEventListener('click', (event) => {

          const intersection =
            event.detail.intersection

          if (!intersection) return

          const point =
            intersection.point

          model.object3D.position.copy(point)

          model.setAttribute(
            'visible',
            'true'
          )

          // começa em 30%
          model.object3D.scale.set(
            0.3,
            0.3,
            0.3
          )

          prompt.style.display =
            'none'

        })

      }

    })

  </script>

</head>

<body>

  <!-- TEXTO -->
  <div id="promptText">
    画面をタップして配置
  </div>

  <a-scene

    tap-place

    xrweb

    xrextras-loading
    xrextras-runtime-error

    renderer="
      colorManagement:true;
      physicallyCorrectLights:true;
      antialias:true;
    "

  >

    <!-- ASSETS -->
    <a-assets>

      <a-asset-item
        id="houseModel"
        src="house.glb">
      </a-asset-item>

    </a-assets>

    <!-- CAMERA -->
    <a-camera

      id="camera"

      position="0 1.6 0"

      raycaster="
        objects: .cantap;
      "

      cursor="
        fuse:false;
        rayOrigin:mouse;
      "

    >
    </a-camera>

    <!-- LIGHT -->
    <a-light
      type="directional"
      intensity="1.2"
      position="1 3 2"
      castShadow="true">
    </a-light>

    <a-light
      type="ambient"
      intensity="1">
    </a-light>

    <!-- GROUND -->
    <a-plane

      id="ground"

      class="cantap"

      rotation="-90 0 0"

      width="500"
      height="500"

      material="
        shader:shadow;
        transparent:true;
        opacity:0.35;
      "

      shadow>

    </a-plane>

    <!-- TAP RING -->
    <a-ring

      id="tapRing"

      rotation="-90 0 0"

      radius-inner="0.15"
      radius-outer="0.22"

      material="
        color:#ffffff;
        opacity:0.9;
        shader:flat;
      "

      visible="true">

    </a-ring>

    <!-- HOUSE -->
    <a-entity

      id="model"

      visible="false"

      gltf-model="#houseModel"

      scale="1 1 1"

      rotation="0 0 0"

      shadow>

    </a-entity>

  </a-scene>

</body>

</html>
