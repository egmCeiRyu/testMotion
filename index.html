<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="utf-8" />

  <meta
    name="viewport"
    content="
      width=device-width,
      initial-scale=1,
      maximum-scale=1,
      user-scalable=no
    "
  />

  <title>House AR</title>

  <!-- 8th Wall -->
  <script
    src="./external/scripts/8frame-1.5.0.min.js">
  </script>

  <!-- XR Extras -->
  <script
    src="https://cdn.jsdelivr.net/npm/@8thwall/xrextras@1/dist/xrextras.js"
    crossorigin="anonymous">
  </script>

  <!-- XR Engine -->
  <script
    src="https://cdn.jsdelivr.net/npm/@8thwall/engine-binary@1/dist/xr.js"
    async
    crossorigin="anonymous"
    data-preload-chunks="slam">
  </script>

  <!-- Seu JS -->
  <script src="./tap-place.js"></script>

  <style>

    html,
    body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: black;
      font-family: Arial, sans-serif;
    }

    #promptText {
      position: fixed;

      bottom: 140px;
      left: 50%;

      transform: translateX(-50%);

      color: white;
      font-size: 24px;
      font-weight: bold;

      text-shadow: 0 0 10px black;

      z-index: 999;

      pointer-events: none;
    }

    #colorMenu {

      position: fixed;

      bottom: 30px;
      left: 50%;

      transform: translateX(-50%);

      display: flex;
      gap: 10px;

      z-index: 999;

    }

    #colorMenu button {

      width: 42px;
      height: 42px;

      border-radius: 50%;

      border: 3px solid white;

    }

  </style>

</head>

<body>

  <!-- TEXTO -->
  <div id="promptText">
    タップして配置
  </div>

  <!-- MENU DE CORES -->
  <div id="colorMenu">

    <button
      data-color="#d9d2c3"
      style="background:#d9d2c3;">
    </button>

    <button
      data-color="#bfa58a"
      style="background:#bfa58a;">
    </button>

    <button
      data-color="#8b6f5a"
      style="background:#8b6f5a;">
    </button>

    <button
      data-color="#5c4435"
      style="background:#5c4435;">
    </button>

    <button
      data-color="#2f241d"
      style="background:#2f241d;">
    </button>

  </div>

  <a-scene

    tap-place

    xrweb

    xrextras-loading
    xrextras-runtime-error

    renderer="
      colorManagement:true;
      physicallyCorrectLights:true;
      antialias:true;
    "

  >

    <!-- ASSETS -->
    <a-assets>

      <a-asset-item
        id="houseModel"
        src="./house.glb">
      </a-asset-item>

    </a-assets>

    <!-- CAMERA -->
    <a-camera

      position="0 1.6 0"

      raycaster="
        objects: .cantap;
      "

      cursor="
        fuse:false;
        rayOrigin:mouse;
      "

    >
    </a-camera>

    <!-- LUZ -->
    <a-light
      type="ambient"
      intensity="1">
    </a-light>

    <a-light
      type="directional"
      intensity="1.2"
      position="1 3 2">
    </a-light>

    <!-- GROUND -->
    <a-plane

      id="ground"

      class="cantap"

      rotation="-90 0 0"

      width="500"
      height="500"

      material="
        opacity:0;
        transparent:true;
      "

    >
    </a-plane>

    <!-- TAP RING -->
    <a-ring

      id="tapRing"

      rotation="-90 0 0"

      radius-inner="0.15"
      radius-outer="0.22"

      material="
        color:white;
        shader:flat;
      "

      visible="false">

    </a-ring>

    <!-- CASA -->
    <a-entity

      id="model"

      gltf-model="#houseModel"

      visible="false"

      scale="1 1 1"

    >
    </a-entity>

  </a-scene>

</body>

</html>
