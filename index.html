<!DOCTYPE html>
<html>

<head>
  <meta charset="utf-8" />

  <meta
    name="viewport"
    content="
      width=device-width,
      initial-scale=1,
      maximum-scale=1,
      user-scalable=no
    "
  />

  <title>House AR</title>

  <!-- 8th Wall Open Source -->
  <script src="./external/8frame-1.4.1.min.js"></script>

  <!-- XR Extras -->
  <script src="https://cdn.jsdelivr.net/npm/@8thwall/xrextras@latest/dist/xrextras.js"></script>

  <!-- Seu script -->
  <script src="tap-place.js"></script>

  <style>

    html,
    body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: black;
      font-family: Arial, sans-serif;
    }

    #promptText {
      position: fixed;
      bottom: 140px;
      left: 50%;
      transform: translateX(-50%);

      color: white;
      font-size: 24px;
      font-weight: bold;

      text-shadow: 0 0 10px black;

      z-index: 999;

      pointer-events: none;
    }

  </style>

</head>

<body>

  <!-- TEXTO -->
  <div id="promptText">
    タップして配置
  </div>

  <a-scene

    xrweb

    xrextras-loading
    xrextras-runtime-error
    xrextras-almost-there
    xrextras-fullscreen

    renderer="
      colorManagement:true;
      physicallyCorrectLights:true;
      antialias:true;
    "

  >

    <!-- CAMERA -->
    <a-camera
      position="0 1.6 0">
    </a-camera>

    <!-- LUZ -->
    <a-light
      type="directional"
      intensity="1.2"
      position="1 3 2">
    </a-light>

    <a-light
      type="ambient"
      intensity="1">
    </a-light>

    <!-- CHÃO -->
    <a-plane
      id="ground"
      rotation="-90 0 0"
      width="500"
      height="500"
      material="
        opacity:0;
        transparent:true;
      "
      shadow>
    </a-plane>

    <!-- CIRCULO TAP -->
    <a-ring
      id="tapRing"
      rotation="-90 0 0"

      radius-inner="0.15"
      radius-outer="0.22"

      material="
        color:#ffffff;
        opacity:0.9;
        shader:flat;
      "

      visible="false">
    </a-ring>

    <!-- CASA -->
    <a-entity
      id="model"
      visible="false"
      gltf-model="#houseModel"
      scale="1 1 1"
      shadow>
    </a-entity>

    <!-- ASSETS -->
    <a-assets>

      <a-asset-item
        id="houseModel"
        src="house.glb">
      </a-asset-item>

    </a-assets>

  </a-scene>

</body>

</html>
