<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no" />
<title>AR Dance Marker</title>

<!-- A-Frame -->
<script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>

<!-- Animation -->
<script src="https://cdn.jsdelivr.net/npm/aframe-extras@6.1.1/dist/aframe-extras.min.js"></script>

<style>
html,body{
  margin:0;
  width:100%;
  height:100%;
  overflow:hidden;
  background:#000;
}
#txt{
  position:fixed;
  top:20px;
  left:50%;
  transform:translateX(-50%);
  z-index:10;
  color:#fff;
  background:rgba(0,0,0,.55);
  padding:10px 16px;
  border-radius:12px;
  font-family:Arial;
}
</style>
</head>

<body>

<div id="txt">Escaneie o marker</div>

<a-scene
  vr-mode-ui="enabled:false"
  embedded
  renderer="antialias:true; alpha:true">

  <a-assets>
    <!-- coloque seu arquivo GLB aqui -->
    <a-asset-item id="dancer" src="assets/thriller.glb"></a-asset-item>
  </a-assets>

  <!-- câmera -->
  <a-camera position="0 1.6 0"></a-camera>

  <!-- marker target -->
  <a-marker preset="hiro">

    <a-entity
      gltf-model="#dancer"
      animation-mixer
      position="0 0 0"
      rotation="0 180 0"
      scale="0.35 0.35 0.35">
    </a-entity>

  </a-marker>

</a-scene>

<!-- AR.js (marker tracking sem API key) -->
<script src="https://rawcdn.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>

</body>
</html>
