<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AR Image Tracking</title>
    
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    
    <script src="./libs/xr.js"></script>
    <script src="./libs/xr-slam.js"></script>

    <script>
      // Configuração antes da cena carregar
      window.addEventListener('xrloaded', () => {
        // Isso resolve o erro de "null reading src"
        window.XR8.setxrconfig({
          libraryPath: './resources/' 
        })
      })
    </script>
</head>

<body style="margin: 0; overflow: hidden; background: black;">

    <a-scene 
      xrweb="disableWorldTracking: true"
      xrextras-loading
      xrextras-runtime-error
      vr-mode-ui="enabled: false">
      
        <a-assets>
            <a-asset-item id="meu-modelo" src="assets/modelo-3d.glb"></a-asset-item>
        </a-assets>

        <a-entity xrextras-named-image-target="name: image">
            <a-entity 
                gltf-model="#meu-modelo" 
                scale="0.001 0.001 0.001"
                rotation="0 0 0">
            </a-entity>
        </a-entity>

        <a-camera position="0 0 0"></a-camera>
    </a-scene>

</body>
</html>
