<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">

<title>Thriller AR</title>

<script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/aframe-extras@6.1.1/dist/aframe-extras.min.js"></script>
<script src="https://rawcdn.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>

<style>
html,body{
margin:0;
overflow:hidden;
width:100%;
height:100%;
}
#txt{
position:fixed;
top:20px;
left:50%;
transform:translateX(-50%);
z-index:10;
color:white;
background:rgba(0,0,0,.5);
padding:10px 15px;
border-radius:10px;
font-family:Arial;
}
</style>
</head>

<body>

<div id="txt">Escaneie o marker Hiro</div>

<a-scene
embedded
vr-mode-ui="enabled:false"
renderer="logarithmicDepthBuffer:true;"
arjs="sourceType: webcam; debugUIEnabled:false;">

<a-assets>
<a-asset-item id="char" src="./assets/thriller.glb"></a-asset-item>
</a-assets>

<a-marker preset="hiro">

<a-entity
gltf-model="#char"
animation-mixer
position="0 0 0"
rotation="0 180 0"
scale="0.4 0.4 0.4">
</a-entity>

</a-marker>

<a-entity camera></a-entity>

</a-scene>

</body>
</html>
