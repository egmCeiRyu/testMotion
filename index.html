<!DOCTYPE html>
<html>

<head>
  <meta charset="utf-8" />
  <meta name="viewport"
    content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />

  <title>House AR</title>

  <!-- 8th Wall -->
  <script src="//cdn.8thwall.com/web/aframe/8frame-1.4.1.min.js"></script>
  <script src="//cdn.8thwall.com/web/xrextras/xrextras.js"></script>
  <script src="//apps.8thwall.com/xrweb?appKey=YOUR_APP_KEY"></script>

  <!-- AFRAME -->
  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>

  <!-- COMPONENT -->
  <script src="tap-place.js"></script>

  <style>

    html,
    body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: Arial, sans-serif;
      background: black;
    }

    #promptText {
      position: fixed;
      bottom: 140px;
      left: 50%;
      transform: translateX(-50%);
      color: white;
      font-size: 24px;
      font-weight: bold;
      text-shadow: 0 0 10px black;
      z-index: 999;
      pointer-events: none;
    }

  </style>
</head>

<body>

  <!-- TAP TEXT -->
  <div id="promptText">
    タップして配置
  </div>

  <a-scene

    xrextras-loading
    xrextras-runtime-error
    xrextras-almost-there
    xrextras-fullscreen

    renderer="
      colorManagement:true;
      physicallyCorrectLights:true;
      antialias:true;
    "

    xrweb>

    <!-- CAMERA -->
    <a-camera
      position="0 1.6 0">
    </a-camera>

    <!-- LIGHT -->
    <a-light
      type="directional"
      intensity="1.2"
      position="1 3 2">
    </a-light>

    <a-light
      type="ambient"
      intensity="1">
    </a-light>

    <!-- GROUND -->
    <a-plane
      id="ground"
      rotation="-90 0 0"
      width="500"
      height="500"
      material="opacity:0; transparent:true"
      shadow>
    </a-plane>

    <!-- TAP RING -->
    <a-ring
      id="tapRing"
      rotation="-90 0 0"
      radius-inner="0.15"
      radius-outer="0.22"
      material="
        color:#ffffff;
        opacity:0.9;
        shader:flat;
      "
      visible="false">
    </a-ring>

    <!-- HOUSE MODEL -->
    <a-entity
      id="model"
      visible="false"
      gltf-model="#houseModel"
      scale="1 1 1"
      shadow>
    </a-entity>

    <!-- ASSETS -->
    <a-assets>

      <a-asset-item
        id="houseModel"
        src="house.glb">
      </a-asset-item>

    </a-assets>

  </a-scene>

</body>

</html>
