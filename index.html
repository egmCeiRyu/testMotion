<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="utf-8">
    <title>Meu AR 8th Wall Local</title>
    <script type="module" src="./libs/xr.js"></script>
    <script type="module" src="./libs/xr-slam.js"></script>
    
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
</head>
<body style="margin: 0; overflow: hidden;">

    <a-scene xrweb="disableWorldTracking: true">
        <a-assets>
            <a-asset-item id="modelo-3d" src="./assets/modelo-3d.glb"></a-asset-item>
        </a-assets>

        <a-entity xrextras-named-image-target="name: image">
            <a-entity 
                gltf-model="#modelo-3d" 
                scale="1 1 1">
            </a-entity>
        </a-entity>

        <a-camera position="0 0 0"></a-camera>
    </a-scene>

</body>
</html>
