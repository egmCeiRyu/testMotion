<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AR Test</title>
    
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    
    <script type="module">
        // Importamos os arquivos da pasta libs na raiz
        import './libs/xr.js'
        import './libs/xr-slam.js'

        // Configuramos o motor assim que ele carregar
        window.addEventListener('xrloaded', () => {
            console.log("8th Wall Motor Carregado!");
            window.XR8.setxrconfig({
                libraryPath: './resources/' 
            });
        });
    </script>
</head>

<body style="margin: 0; overflow: hidden; background: black;">

    <a-scene 
      xrweb="disableWorldTracking: true"
      xrextras-loading
      xrextras-runtime-error>
      
        <a-assets>
            <a-asset-item id="meu-modelo" src="assets/modelo-3d.glb"></a-asset-item>
        </a-assets>

        <a-entity xrextras-named-image-target="name: image">
            <a-entity 
                gltf-model="#meu-modelo" 
                scale="0.001 0.001 0.001">
            </a-entity>
        </a-entity>

        <a-camera position="0 0 0"></a-camera>
    </a-scene>

</body>
</html>
