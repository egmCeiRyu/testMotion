<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AR Test - Cube</title>
    
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    
    <script type="module">
        import './libs/xr.js'
        import './libs/xr-slam.js'

        window.addEventListener('xrloaded', () => {
            window.XR8.setxrconfig({
                libraryPath: './resources/' 
            });
        });
    </script>
</head>

<body style="margin: 0; overflow: hidden; background: black;">
    <a-scene 
      xrweb="disableWorldTracking: true"
      xrextras-almost-there
      xrextras-loading
      xrextras-runtime-error>

        <a-entity xrextras-named-image-target="name: image">
            <a-box position="0 0.5 0" material="color: red" scale="0.5 0.5 0.5"></a-box>
        </a-entity>

        <a-camera position="0 0 0"></a-camera>
    </a-scene>
</body>
</html>
