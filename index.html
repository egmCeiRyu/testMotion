<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport"
content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">

<title>8th Wall AR</title>

<script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/aframe-extras@6.1.1/dist/aframe-extras.min.js"></script>

<script src="./libs/xr.js"></script>
<script src="./libs/xr-slam.js"></script>

<style>
html,body{
margin:0;
padding:0;
width:100%;
height:100%;
overflow:hidden;
background:#000;
}

a-scene{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
}
</style>
</head>

<body>

<a-scene
xrweb
xrextras-loading
xrextras-runtime-error
xrextras-almost-there
renderer="alpha:true;antialias:true">

<a-assets>
<a-asset-item
id="modelo"
src="./assets/modelo-3d.glb">
</a-asset-item>
</a-assets>

<a-entity
gltf-model="#modelo"
animation-mixer
position="0 0 -3"
rotation="0 180 0"
scale="0.35 0.35 0.35">
</a-entity>

<a-camera position="0 0 0"></a-camera>

</a-scene>

</body>
</html>
