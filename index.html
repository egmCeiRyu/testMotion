<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta
  name="viewport"
  content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
/>
<title>8th Wall AR Dance</title>

<!-- A-Frame -->
<script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>

<!-- Animation Mixer -->
<script src="https://cdn.jsdelivr.net/npm/aframe-extras@6.1.1/dist/aframe-extras.min.js"></script>

<!-- 8th Wall Runtime (no projeto oficial normalmente já vem configurado) -->
<script src="//apps.8thwall.com/xrweb?appKey=YOUR_APP_KEY"></script>

<style>
html, body {
  margin: 0;
  padding: 0;
  overflow: hidden;
  width: 100%;
  height: 100%;
  font-family: Arial, sans-serif;
}

#info {
  position: fixed;
  top: 20px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 10;
  color: white;
  background: rgba(0,0,0,.55);
  padding: 10px 16px;
  border-radius: 12px;
  font-size: 16px;
}
</style>
</head>

<body>

<div id="info">Escaneie o marker</div>

<a-scene
  xrweb
  xrextras-loading
  xrextras-runtime-error
  renderer="colorManagement:true; antialias:true">

  <!-- Assets -->
  <a-assets>
    <!-- coloque seu arquivo aqui -->
    <a-asset-item id="dancer" src="assets/thriller.glb"></a-asset-item>
  </a-assets>

  <!-- Marker -->
  <xrextras-named-image-target name="card1">

    <!-- personagem -->
    <a-entity
      gltf-model="#dancer"
      animation-mixer
      position="0 0 0"
      rotation="0 180 0"
      scale="0.35 0.35 0.35">
    </a-entity>

  </xrextras-named-image-target>

  <a-camera position="0 4 10"></a-camera>

</a-scene>

</body>
</html>
