<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport"
content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">

<title>Thriller AR Final</title>

<!-- A-Frame -->
<script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>

<!-- Animation -->
<script src="https://cdn.jsdelivr.net/npm/aframe-extras@6.1.1/dist/aframe-extras.min.js"></script>

<!-- Self Hosted XR -->
<script type="module">
import './libs/xr.js'
import './libs/xr-slam.js'

window.addEventListener('xrloaded', () => {
  XR8.setxrconfig({
    libraryPath: './resources/'
  })

  console.log('XR carregado')
})
</script>

<style>
html,body{
margin:0;
padding:0;
width:100%;
height:100%;
overflow:hidden;
background:transparent;
touch-action:none;
}

a-scene{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
}

#msg{
position:fixed;
top:20px;
left:50%;
transform:translateX(-50%);
z-index:9999;
padding:10px 16px;
border-radius:12px;
background:rgba(0,0,0,.45);
color:#fff;
font-family:Arial;
font-size:15px;
}
</style>
</head>

<body>

<div id="msg">Escaneie o marker</div>

<a-scene
xrweb="imageTargetsSrc: assets/image.wtarget"
renderer="alpha:true; antialias:true; colorManagement:true"
xrextras-loading
xrextras-runtime-error
xrextras-almost-there>

<a-assets>

<a-asset-item
id="thriller"
src="assets/modelo-3d.glb">
</a-asset-item>

</a-assets>

<xrextras-named-image-target name="image">

<a-entity
gltf-model="#thriller"
animation-mixer
position="0 0 0"
rotation="0 180 0"
scale="0.35 0.35 0.35">
</a-entity>

</xrextras-named-image-target>

<a-camera position="0 0 0"></a-camera>

</a-scene>

</body>
</html>
