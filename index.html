<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AR Test Final</title>
    
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    
    <script type="module">
        // Importamos os scripts
        import './libs/xr.js'
        import './libs/xr-slam.js'

        // 1. Configuramos o motor assim que ele carregar na memória
        window.addEventListener('xrloaded', () => {
            XR8.setxrconfig({
                libraryPath: './resources/' 
            })
        })

        // 2. Só ligamos o componente de AR quando o motor der o sinal de OK
        window.addEventListener('xrloaded', () => {
            const scene = document.querySelector('a-scene')
            
            // Verificamos se a cena existe e injetamos o componente XR8
            if (scene) {
                scene.setAttribute('xrweb', 'disableWorldTracking: true')
                console.log("Sistema AR injetado com sucesso!")
            }
        })
    </script>
</head>

<body style="margin: 0; overflow: hidden; background: black;">

    <a-scene 
      xrextras-almost-there
      xrextras-loading
      xrextras-runtime-error>
      
        <a-assets>
            <a-asset-item id="meu-modelo" src="assets/modelo-3d.glb" timeout="60000"></a-asset-item>
        </a-assets>

        <a-entity xrextras-named-image-target="name: image">
            <a-box position="0 0.5 0" material="color: red"></a-box>
            
            </a-entity>

        <a-camera position="0 0 0"></a-camera>
    </a-scene>

</body>
</html>
